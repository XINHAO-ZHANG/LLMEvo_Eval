# db_mode: [simple, map]
# task: [tsp, gcolor, promptopt, codegen, kernelopt]
# parent_slots: int
# child_slots: int
# n_init: int
# budget: int
# seed: int
# capacity: int
# init_pop_path: str or null
# enable_zero_shot_eval: bool
# max_workers: int (max parallel workers for offspring generation; null=auto)

task: tsp
model: openai/gpt-4o-mini
temperature: 0.7  # LLM sampling temperature for evolution (0–2 typical)
db_mode: simple
parent_slots: 3
child_slots: 10
n_init: 40
budget: 300
seed: 21
capacity: 40
init_pop_path: null
enable_zero_shot_eval: false
max_workers: null  # auto-select; set to 1, 2, 4, 8, etc.

tasks:
  tsp:
    city_num: 30
    n_init: 40
    parent_slots: 3
    child_slots: 10
    max_workers: 4  # TSP eval is fast; high parallelism OK
  kernelopt:
    n_init: 2
    parent_slots: 1
    child_slots: 1
    capacity: 2
    max_workers: 1  # kernelopt eval may be heavy; low parallelism
  gcolor:
    n_init: 50
    parent_slots: 5
    child_slots: 10
    max_workers: 4
  promptopt:
    n_init: 10
    parent_slots: 2
    child_slots: 5
    budget: 150
    eval_task: sum   # sum: summarization, sim: simplification
    eval_set: test
    max_workers: 2  # promptopt makes API calls; limit to avoid rate-limiting
  symboreg_oscillator1:
    seed: 21
    max_workers: 4
  symboreg_oscillator2:
    seed: 21
    max_workers: 4
  bin_packing:
    n_init: 7
    parent_slots: 2
    child_slots: 10
    max_workers: 4
    seed: 42
    dataset_type: or3  # or 'weibull'

# Hydra: disable automatic timestamped dirs; outputs managed by scripts/run_exp.py
hydra:
  run:
    dir: .
